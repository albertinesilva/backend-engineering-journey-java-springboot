# =====================================================
# APPLICATION METADATA
# =====================================================
# Nome lógico da aplicação utilizado para identificação em logs,
# monitoramento, tracing distribuído e ferramentas de observabilidade
spring.application.name=DSCatalog

# Porta HTTP utilizada pela aplicação no ambiente de testes.
# Pode ser alterada conforme necessidade (ex: execução paralela ou conflitos de porta)
server.port=8080

# ================================
# BANNER DE INICIALIZAÇÃO (CUSTOM)
# ================================
# Define um banner personalizado para o ambiente de desenvolvimento.
# Substitui o banner padrão do Spring Boot ao iniciar a aplicação.
# Útil para identificação visual rápida do ambiente durante execução local.
# Observação: esta configuração não deve ser aplicada em produção,
# onde o uso de banners customizados não é recomendado.
spring.banner.location=classpath:banner-dev.txt

# =====================================================
# DATASOURCE (H2 - IN-MEMORY DATABASE)
# =====================================================
# Configuração de banco em memória para execução rápida de testes
# Ideal para cenários isolados sem dependência externa
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=sa
spring.datasource.password=

# =====================================================
# H2 CONSOLE (WEB UI)
# =====================================================
# Habilita console web do H2 para inspeção manual dos dados
# NÃO recomendado para produção
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =====================================================
# JPA / HIBERNATE
# =====================================================
# Exibe queries SQL no console (debug)
spring.jpa.show-sql=true

# Formata SQL para melhor legibilidade
spring.jpa.properties.hibernate.format_sql=true

# =====================================================
# DATABASE MIGRATION (FLYWAY)
# =====================================================
# Habilita controle de versionamento do banco de dados
spring.flyway.enabled=false

# =====================================================
# LOGGING CONFIGURATION (TEST PROFILE)
# =====================================================
# Ambiente de testes prioriza rastreabilidade e debug detalhado

# Nível global (reduz ruído de bibliotecas externas)
logging.level.root=WARN

# Logs da aplicação (nível detalhado)
logging.level.com.albertsilva.dev.dscatalog=DEBUG

# Logs de requisições HTTP (Spring MVC)
logging.level.org.springframework.web=DEBUG

# Detalhamento completo do ciclo HTTP (usar com cautela)
logging.level.org.springframework.web.servlet.mvc.method.annotation=TRACE

# Logs das queries SQL geradas
logging.level.org.hibernate.SQL=DEBUG

# Logs dos parâmetros bindados nas queries (Hibernate 6+)
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Habilita indentação de JSON para melhor leitura nos logs
spring.jackson.serialization.indent_output=true

# =====================================================
# FILE LOGGING
# =====================================================
# Define arquivo de log segregado por ambiente
logging.file.name=logs/test/dscatalog-test.log

# Configuração de rotação de logs (controle de tamanho e histórico)
logging.logback.rollingpolicy.max-file-size=5MB
logging.logback.rollingpolicy.max-history=5

# =====================================================
# API DOCUMENTATION (SPRINGDOC / OPENAPI)
# =====================================================
# Caminho customizado para Swagger UI
springdoc.swagger-ui.path=/docs-dscatalog.html

# Endpoint de documentação OpenAPI
springdoc.api-docs.path=/docs-dscatalog

# Pacotes escaneados para geração da documentação
springdoc.packagesToScan=com.albertsilva.dev.dscatalog.web.controller

