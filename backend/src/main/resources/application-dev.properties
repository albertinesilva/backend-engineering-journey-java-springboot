# =====================================================
# APPLICATION METADATA
# =====================================================
# Nome lógico da aplicação utilizado para identificação em logs,
# monitoramento, tracing distribuído e ferramentas de observabilidade
spring.application.name=DSCatalog

# Porta HTTP utilizada pela aplicação no ambiente de testes.
# Pode ser alterada conforme necessidade (ex: execução paralela ou conflitos de porta)
server.port=8080

# ================================
# BANNER DE INICIALIZAÇÃO (CUSTOM)
# ================================
# Define um banner personalizado para o ambiente de desenvolvimento.
# Substitui o banner padrão do Spring Boot ao iniciar a aplicação.
# Útil para identificação visual rápida do ambiente durante execução local.
# Observação: esta configuração não deve ser aplicada em produção,
# onde o uso de banners customizados não é recomendado.
spring.banner.location=classpath:banner-dev.txt

# =====================================================
# LOCALE E ENCODING
# =====================================================
# Define locale fixo para padronização regional (datas, números, etc.)
spring.web.locale-resolver=fixed
spring.web.locale=pt_BR

# Configuração de encoding para requisições/respostas HTTP
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true

# =====================================================
# DATABASE CONFIGURATION (POSTGRESQL)
# =====================================================
# Configuração de banco relacional para ambiente de desenvolvimento
# Credenciais externas via variáveis de ambiente (boa prática)
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/dscatalog
spring.datasource.username=${POSTGRES_DATASOURCE_USER}
spring.datasource.password=${POSTGRES_DATASOURCE_PASSWORD}

# =====================================================
# JPA / HIBERNATE
# =====================================================
# IMPORTANTE:
# Controle de schema delegado ao Flyway (evita conflitos)
spring.jpa.hibernate.ddl-auto=none

# Exibe SQL no console (debug em desenvolvimento)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =====================================================
# DATABASE MIGRATION (FLYWAY)
# =====================================================
# Habilita controle de versionamento do banco de dados
spring.flyway.enabled=true

# Separação de scripts por responsabilidade (estrutura e dados)
spring.flyway.locations=classpath:db/migration/schema,classpath:db/migration/data

# Log detalhado das execuções de migration
logging.level.org.flywaydb=DEBUG

# =====================================================
# API DOCUMENTATION (SPRINGDOC / OPENAPI)
# =====================================================
# Caminho customizado para Swagger UI
springdoc.swagger-ui.path=/docs-dscatalog.html

# Endpoint de documentação OpenAPI
springdoc.api-docs.path=/docs-dscatalog

# Pacotes escaneados para geração da documentação
springdoc.packagesToScan=com.albertsilva.dev.dscatalog.web.controller

# =====================================================
# LOGGING CONFIGURATION (DEV PROFILE)
# =====================================================

# Nível global (reduz ruído de bibliotecas)
logging.level.root=WARN

# Logs da aplicação (debug ativo para desenvolvimento)
logging.level.com.albertsilva.dev.dscatalog=DEBUG

# Logs do Spring Framework (nível informativo)
logging.level.org.springframework=INFO

# Logs das queries SQL
logging.level.org.hibernate.SQL=DEBUG

# Logs dos parâmetros das queries (útil para debug)
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# =====================================================
# FILE LOGGING
# =====================================================
# Arquivo de log específico para ambiente de desenvolvimento
logging.file.name=logs/dev/dscatalog-dev.log

# Política de rotação de logs (controle de crescimento)
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=10